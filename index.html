<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Clicker test</title>
</head>
<body>

        <ul class="switches">
  <li>
    <input type="radio" id="light" name="theme-mode" checked>
    <label for="light">
      <span>Light</span>
      <span></span>
    </label>
  </li>
  <li>
    <input type="radio" id="dark" name="theme-mode">
    <label for="dark">
      <span>Dark</span>
      <span></span>
    </label>
  </li>
  <li>
</ul>

<div class="counter-container">
  <h1>Lizard Clicker 2.0</h1>
  <p class="counter-display">Count: <span id="count">0</span></p>
  <button onclick="initConfetti()" class="button" id="audio-btn">🦎</button>
</div>

<canvas id="canvas"></canvas> 

<script>
const incrementBtn = document.getElementById('audio-btn'); // correct ID
const countDisplay = document.getElementById('count');

let count = 0;

incrementBtn.addEventListener('click', () => {
    count++;
    countDisplay.textContent = count;

    // Play sound instantly
    const sound = new Audio('lizard-button.mp3');
    sound.play();
});
</script>

<script>
const html = document.documentElement;
const switches = document.querySelector(".switches");
const inputs = switches.querySelectorAll("input");
if (localStorage.getItem("dark-mode")) {
  html.classList.add("theme-dark");
}
if (localStorage.getItem("selected-radio")) {
  switches.querySelector(`#${localStorage.getItem("selected-radio")}`).checked =
    "true";
}
const setTheme = (theme) => {
  if (theme === "dark") {
    html.classList.add("theme-dark");
    localStorage.setItem("dark-mode", "true");
  } else {
    html.classList.remove("theme-dark");
    localStorage.removeItem("dark-mode");
  }
};
const handleMediaChange = (e) => {
  if (switches.querySelector('[type="radio"]:checked').id === "auto") {
    setTheme(e.matches ? "dark" : "light");
  }
};
const handleInputChange = (e) => {
  const themeMode = e.target.id;
  if (
    themeMode === "dark" ||
    (themeMode === "auto" &&
      window.matchMedia("(prefers-color-scheme: dark)").matches)
  ) {
    setTheme("dark");
  } else {
    setTheme("light");
  }
  localStorage.setItem("selected-radio", themeMode);
};
window
  .matchMedia("(prefers-color-scheme: dark)")
  .addEventListener("change", handleMediaChange);
inputs.forEach((input) => input.addEventListener("input", handleInputChange));
</script>

<script>
//-----------Var Inits--------------
canvas = document.getElementById("canvas");
ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
cx = ctx.canvas.width / 2;
cy = ctx.canvas.height / 2;
 
let confetti = [];
const confettiCount = 300;
const gravity = 0.5;
const terminalVelocity = 5;
const drag = 0.075;
const colors = [
{ front: 'red', back: 'darkred' },
{ front: 'green', back: 'darkgreen' },
{ front: 'blue', back: 'darkblue' },
{ front: 'yellow', back: 'darkyellow' },
{ front: 'orange', back: 'darkorange' },
{ front: 'pink', back: 'darkpink' },
{ front: 'purple', back: 'darkpurple' },
{ front: 'turquoise', back: 'darkturquoise' }];
 
 
//-----------Functions--------------
resizeCanvas = () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  cx = ctx.canvas.width / 2;
  cy = ctx.canvas.height / 2;
};
 
randomRange = (min, max) => Math.random() * (max - min) + min;
 
initConfetti = () => {
  for (let i = 0; i < confettiCount; i++) {
    confetti.push({
      color: colors[Math.floor(randomRange(0, colors.length))],
      dimensions: {
        x: randomRange(10, 20),
        y: randomRange(10, 30) },
 
      position: {
        x: randomRange(0, canvas.width),
        y: canvas.height - 1 },
 
      rotation: randomRange(0, 2 * Math.PI),
      scale: {
        x: 1,
        y: 1 },
 
      velocity: {
        x: randomRange(-25, 25),
        y: randomRange(0, -50) } });
 
 
  }
};
 
//---------Render-----------
render = () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
 
  confetti.forEach((confetto, index) => {
    let width = confetto.dimensions.x * confetto.scale.x;
    let height = confetto.dimensions.y * confetto.scale.y;
 
    // Move canvas to position and rotate
    ctx.translate(confetto.position.x, confetto.position.y);
    ctx.rotate(confetto.rotation);
 
    // Apply forces to velocity
    confetto.velocity.x -= confetto.velocity.x * drag;
    confetto.velocity.y = Math.min(confetto.velocity.y + gravity, terminalVelocity);
    confetto.velocity.x += Math.random() > 0.5 ? Math.random() : -Math.random();
 
    // Set position
    confetto.position.x += confetto.velocity.x;
    confetto.position.y += confetto.velocity.y;
 
    // Delete confetti when out of frame
    if (confetto.position.y >= canvas.height) confetti.splice(index, 1);
 
    // Loop confetto x position
    if (confetto.position.x > canvas.width) confetto.position.x = 0;
    if (confetto.position.x < 0) confetto.position.x = canvas.width;
 
    // Spin confetto by scaling y
    confetto.scale.y = Math.cos(confetto.position.y * 0.1);
    ctx.fillStyle = confetto.scale.y > 0 ? confetto.color.front : confetto.color.back;

 //------------Click------------
    // Draw confetti
    ctx.fillRect(-width / 2, -height / 2, width, height);
 
    // Reset transform matrix
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  });
 
  // Fire off another round of confetti 
  window.requestAnimationFrame(render);
};
 
//---------Execution--------
initConfetti();
render();
 
//----------Resize----------
window.addEventListener('resize', function () {
  resizeCanvas();
});
 
</script>


</body>
</html>
